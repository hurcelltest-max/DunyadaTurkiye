name: Build Android TWA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Build APK/AAB
        run: |
          sudo apt-get update && sudo apt-get install -y expect
          rm -rf ~/.bubblewrap
          cat << 'EOF' > build.exp
          set timeout -1
          
          spawn npx @bubblewrap/cli init --manifest=https://dunyadaturkiye.com/manifest.json
          expect {
            -re "(?i)(download|install|agreement|license|agree).*\\?" { send "y\r"; exp_continue }
            -re "(?i)Web application URL.*:" { send "\r"; exp_continue }
            -re "(?i)Application name.*:" { send "\r"; exp_continue }
            -re "(?i)Short name.*:" { send "\r"; exp_continue }
            -re "(?i)Application ID.*:" { send "com.dunyadaturkiye.app\r"; exp_continue }
            -re "(?i)Starting version.*:" { send "\r"; exp_continue }
            -re "(?i)Theme color.*:" { send "\r"; exp_continue }
            -re "(?i)Background color.*:" { send "\r"; exp_continue }
            -re "(?i)Launcher icon.*:" { send "\r"; exp_continue }
            -re "(?i)Maskable icon.*:" { send "\r"; exp_continue }
            -re "(?i)Include source code.*:" { send "y\r"; exp_continue }
            -re "(?i)Key store location.*:" { send "\r"; exp_continue }
            -re "(?i)Key name.*:" { send "\r"; exp_continue }
            -re "(?i)password.*:" { send "password123\r"; exp_continue }
            -re "(?i)First and Last names.*:" { send "DunyadaTurkiye\r"; exp_continue }
            -re "(?i)Organizational unit.*:" { send "App\r"; exp_continue }
            -re "(?i)Organization.*:" { send "DunyadaTurkiye\r"; exp_continue }
            -re "(?i)City or Locality.*:" { send "City\r"; exp_continue }
            -re "(?i)State or Province.*:" { send "State\r"; exp_continue }
            -re "(?i)Two-letter country code.*:" { send "TR\r"; exp_continue }
            -re ".*:" { send "\r"; exp_continue }
            eof
          }

          spawn npx @bubblewrap/cli build
          expect {
            -re "(?i)(download|install|agreement|license|agree).*\\?" { send "y\r"; exp_continue }
            -re "(?i)password.*:" { send "password123\r"; exp_continue }
            eof
          }
          EOF
          expect build.exp

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DunyadaTurkiye-Android-App
          path: |
            app-release-bundle.aab
            app-release-signed.apk
            android.keystore
