name: Build Android TWA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Configure Bubblewrap Paths
        run: |
          mkdir -p ~/.bubblewrap
          cat << EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Generate TWA Manifest
        run: |
          cat << 'EOF' > twa-manifest.json
          {
            "packageId": "com.dunyadaturkiye.app",
            "host": "dunyadaturkiye.com",
            "name": "DünyadaTürkiye",
            "launcherName": "DünyadaTR",
            "display": "standalone",
            "themeColor": "#0f172a",
            "navigationColor": "#0f172a",
            "navigationColorDark": "#0f172a",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#0f172a",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://hurcelltest-max.github.io/DunyadaTurkiye/icon512.png",
            "maskableIconUrl": "https://hurcelltest-max.github.io/DunyadaTurkiye/icon512.png",
            "splashScreenColors": {
              "default": "#0f172a",
              "dark": "#0f172a"
            },
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "shortcuts": [],
            "generatorApp": "Custom Action",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            }
          }
          EOF

      - name
